      type: object
      properties:
        content:
          type: string
          description: 'Content must be SKILL.md-format Markdown with YAML frontmatter. The

            frontmatter must include name, may include description, and must be

            followed by a non-empty body.'
    codersdk.UpdateUserPreferenceSettingsRequest:
      type: object
      properties:
        agent_chat_send_shortcut:
          $ref: '#/components/schemas/codersdk.AgentChatSendShortcut'
        code_diff_display_mode:
          $ref: '#/components/schemas/codersdk.AgentDisplayMode'
        shell_tool_display_mode:
          $ref: '#/components/schemas/codersdk.AgentDisplayMode'
        task_notification_alert_dismissed:
          type: boolean
        thinking_display_mode:
          $ref: '#/components/schemas/codersdk.ThinkingDisplayMode'
    codersdk.UpdateUserAppearanceSettingsRequest:
      type: object
      properties:
        terminal_font:
          $ref: '#/components/schemas/codersdk.TerminalFontName'
        theme_dark:
          type: string
          description: 'ThemeDark is required when ThemeMode is "sync". In "single" mode

            an empty value means "preserve the previously persisted slot"

            rather than "clear the slot", so partial updates that send only

            one slot keep the other intact.'
          enum:
          - light
          - light-protan-deuter
          - light-tritan
          - dark
          - dark-protan-deuter
          - dark-tritan
        theme_light:
          type: string
          description: 'ThemeLight is required when ThemeMode is "sync". In "single"

            mode an empty value means "preserve the previously persisted

            slot" rather than "clear the slot", so partial updates that send

            only one slot keep the other intact.'
          enum:
          - light
          - light-protan-deuter
          - light-tritan
          - dark
          - dark-protan-deuter
          - dark-tritan
        theme_mode:
          description: 'ThemeMode is optional for backward compatibility. When empty,

            the server leaves theme_mode, theme_light, and theme_dark

            unchanged so older CLI clients do not erase sync-mode settings.

            Legacy auto preferences are the exception: they clear theme_mode

            so clients can migrate the old sync-with-system setting.'
          enum:
          - sync
          - single
          allOf:
          - $ref: '#/components/schemas/codersdk.ThemeMode'
        theme_preference:
          type: string
      required:
      - terminal_font
      - theme_preference
