components:
  schemas:
    codersdk.APIAllowListTarget:
      type: object
      properties:
        id:
          type: string
        type:
          $ref: '#/components/schemas/codersdk.RBACResource'
    codersdk.ThemeMode:
      type: string
      enum:
      - ''
      - sync
      - single
    codersdk.OIDCAuthMethod:
      type: object
      properties:
        enabled:
          type: boolean
        iconUrl:
          type: string
        signInText:
          type: string
    codersdk.AuthMethod:
      type: object
      properties:
        enabled:
          type: boolean
    codersdk.OIDCClaimsResponse:
      type: object
      properties:
        claims:
          type: object
          description: 'Claims are the merged claims from the OIDC provider. These

            are the union of the ID token claims and the userinfo claims,

            where userinfo claims take precedence on conflict.'
          additionalProperties: true
    codersdk.Organization:
      type: object
      properties:
        created_at:
          type: string
          format: date-time
        default_org_member_roles:
          type: array
          description: 'DefaultOrgMemberRoles are unioned into every member''s effective

            roles at request time. Changes propagate to all members on the

            next request.'
          items:
            type: string
        description:
          type: string
        display_name:
          type: string
        icon:
          type: string
        id:
          type: string
          format: uuid
        is_default:
          type: boolean
        name:
          type: string
        updated_at:
          type: string
          format: date-time
      required:
      - created_at
      - id
      - is_default
      - updated_at
    codersdk.APIKeyScope:
      type: string
      enum:
      - all
      - application_connect
      - ai_gateway_key:*
      - ai_gateway_key:create
      - ai_gateway_key:delete
      - ai_gateway_key:read
      - ai_model_price:*
      - ai_model_price:read
      - ai_model_price:update
      - ai_provider:*
      - ai_provider:create
      - ai_provider:delete
      - ai_provider:read
      - ai_provider:update
      - ai_seat:*
      - ai_seat:create
      - ai_seat:read
      - aibridge_interception:*
      - aibridge_interception:create
      - aibridge_interception:read
      - aibridge_interception:update
      - api_key:*
      - api_key:create
      - api_key:delete
