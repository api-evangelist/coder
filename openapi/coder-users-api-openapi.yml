      - name: keyid
        in: path
        required: true
        description: Key ID
        schema:
          type: string
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.Response'
