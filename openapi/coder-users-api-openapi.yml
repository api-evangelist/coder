    codersdk.UserAppearanceSettings:
      type: object
      properties:
        terminal_font:
          $ref: '#/components/schemas/codersdk.TerminalFontName'
        theme_dark:
          type: string
          description: Ignored when ThemeMode is "single"
        theme_light:
          type: string
          description: Ignored when ThemeMode is "single"
        theme_mode:
          $ref: '#/components/schemas/codersdk.ThemeMode'
        theme_preference:
          type: string
          description: 'ThemePreference is the legacy single-field appearance setting. In

            "single" mode it mirrors the active theme. In "sync" mode modern

            clients normally mirror the active OS slot, but older clients can

            update only this field, so it may diverge from ThemeLight or

            ThemeDark until a modern client saves the full appearance state

            again.'
