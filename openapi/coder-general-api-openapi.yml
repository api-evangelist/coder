    serpent.URL:
      type: object
      properties:
        forceQuery:
          type: boolean
          description: 'ForceQuery indicates whether the original URL contained a query (''?'') character.

            When set, the String method will include a trailing ''?'', even when RawQuery is empty.'
        fragment:
          type: string
          description: fragment for references (without '#')
        host:
          type: string
          description: '"host" or "host:port" (see Hostname and Port methods)'
        omitHost:
          type: boolean
          description: 'OmitHost indicates the URL has an empty host (authority).

            When set, the String method will not include the host when it is empty.'
        opaque:
          type: string
          description: encoded opaque data
        path:
          type: string
          description: path (relative paths may omit leading slash)
        rawFragment:
          type: string
          description: 'RawFragment is an optional field containing an encoded fragment hint.

            See the EscapedFragment method for more details.


            In general, code should call EscapedFragment instead of reading RawFragment.'
        rawPath:
          type: string
          description: 'RawPath is an optional field containing an encoded path hint.

            See the EscapedPath method for more details.


            In general, code should call EscapedPath instead of reading RawPath.'
        rawQuery:
          type: string
          description: 'RawQuery contains the encoded query values, without the initial ''?''.

            Use URL.Query to decode the query.'
        scheme:
          type: string
        user:
          description: username and password information
          allOf:
          - $ref: '#/components/schemas/url.Userinfo'
    codersdk.DERP:
      type: object
      properties:
        config:
          $ref: '#/components/schemas/codersdk.DERPConfig'
