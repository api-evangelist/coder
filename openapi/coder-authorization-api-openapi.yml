openapi: 3.0.3
info:
  description: Coderd is the service created by running coder server. It is a thin API that connects workspaces, provisioners and users. coderd stores its state in Postgres and is the only service that communicates with Postgres.
  title: Coder Agents Authorization API
  termsOfService: https://coder.com/legal/terms-of-service
  contact:
    name: API Support
    url: https://coder.com
    email: support@coder.com
  license:
    name: AGPL-3.0
    url: https://github.com/coder/coder/blob/main/LICENSE
  version: '2.0'
servers:
- url: https://{coderHost}/api/v2
  description: Coder instance
  variables:
    coderHost:
      default: coder.example.com
      description: Your Coder deployment hostname
security:
- CoderSessionToken: []
tags:
- name: Authorization
paths:
  /api/v2/auth/scopes:
    get:
      operationId: list-api-key-scopes
      summary: List API key scopes
      tags:
      - Authorization
      security:
      - CoderSessionToken: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.ExternalAPIKeyScopes'
  /api/v2/authcheck:
    post:
      operationId: check-authorization
      summary: Check authorization
      tags:
      - Authorization
      security:
      - CoderSessionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/codersdk.AuthorizationRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.AuthorizationResponse'
  /api/v2/users/login:
    post:
      operationId: log-in-user
      summary: Log in user
      tags:
      - Authorization
      security:
      - CoderSessionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/codersdk.LoginWithPasswordRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.LoginWithPasswordResponse'
  /api/v2/users/otp/change-password:
    post:
      operationId: change-password-with-a-one-time-passcode
      summary: Change password with a one-time passcode
      tags:
      - Authorization
      security:
      - CoderSessionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/codersdk.ChangePasswordWithOneTimePasscodeRequest'
      responses:
        '204':
          description: No Content
  /api/v2/users/otp/request:
    post:
      operationId: request-one-time-passcode
      summary: Request one-time passcode
      tags:
      - Authorization
      security:
      - CoderSessionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/codersdk.RequestOneTimePasscodeRequest'
      responses:
        '204':
          description: No Content
  /api/v2/users/validate-password:
    post:
      operationId: validate-user-password
      summary: Validate user password
      tags:
      - Authorization
      security:
      - CoderSessionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/codersdk.ValidateUserPasswordRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.ValidateUserPasswordResponse'
  /api/v2/users/{user}/convert-login:
    post:
      operationId: convert-user-from-password-to-oauth-authentication
      summary: Convert user from password to oauth authentication
      tags:
      - Authorization
      security:
      - CoderSessionToken: []
      parameters:
      - name: user
        in: path
        required: true
        description: User ID, name, or me
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/codersdk.ConvertLoginRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.OAuthConversionResponse'
components:
  schemas:
    codersdk.RBACResource:
      type: string
      enum:
      - '*'
      - ai_gateway_key
      - ai_model_price
      - ai_provider
      - ai_seat
      - aibridge_interception
      - api_key
      - assign_org_role
      - assign_role
      - audit_log
      - boundary_log
      - boundary_usage
      - chat
      - connection_log
      - crypto_key
      - debug_info
      - deployment_config
      - deployment_stats
      - file
      - group
      - group_member
      - idpsync_settings
      - inbox_notification
      - license
      - notification_message
      - notification_preference
      - notification_template
      - oauth2_app
      - oauth2_app_code_token
      - oauth2_app_secret
      - organization
      - organization_member
      - prebuilt_workspace
      - provisioner_daemon
      - provisioner_jobs
      - replicas
      - system
      - tailnet_coordinator
      - task
      - template
      - usage_event
      - user
      - user_secret
      - user_skill
      - webpush_subscription
      - workspace
      - workspace_agent_devcontainers
      - workspace_agent_resource_monitor
      - workspace_dormant
      - workspace_proxy
    codersdk.AuthorizationRequest:
      type: object
      properties:
        checks:
          type: object
          description: 'Checks is a map keyed with an arbitrary string to a permission check.

            The key can be any string that is helpful to the caller, and allows

            multiple permission checks to be run in a single request.

            The key ensures that each permission check has the same key in the

            response.'
          additionalProperties:
            $ref: '#/components/schemas/codersdk.AuthorizationCheck'
    codersdk.ExternalAPIKeyScopes:
      type: object
      properties:
        external:
          type: array
          items:
            $ref: '#/components/schemas/codersdk.APIKeyScope'
    codersdk.RequestOneTimePasscodeRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
      - email
    codersdk.OAuthConversionResponse:
      type: object
      properties:
        expires_at:
          type: string
          format: date-time
        state_string:
          type: string
        to_type:
          $ref: '#/components/schemas/codersdk.LoginType'
        user_id:
          type: string
          format: uuid
    codersdk.LoginWithPasswordResponse:
      type: object
      properties:
        session_token:
          type: string
      required:
      - session_token
    codersdk.AuthorizationResponse:
      type: object
      additionalProperties:
        type: boolean
    codersdk.AuthorizationObject:
      type: object
      description: 'AuthorizationObject can represent a "set" of objects, such as: all workspaces in an organization, all workspaces owned by me, all workspaces across the entire product.'
      properties:
        any_org:
          type: boolean
          description: 'AnyOrgOwner (optional) will disregard the org_owner when checking for permissions.

            This cannot be set to true if the OrganizationID is set.'
        organization_id:
          type: string
          description: OrganizationID (optional) adds the set constraint to all resources owned by a given organization.
        owner_id:
          type: string
          description: OwnerID (optional) adds the set constraint to all resources owned by a given user.
        resource_id:
          type: string
          description: 'ResourceID (optional) reduces the set to a singular resource. This assigns

            a resource ID to the resource type, eg: a single workspace.

            The rbac library will not fetch the resource from the database, so if you

            are using this option, you should also set the owner ID and organization ID

            if possible. Be as specific as possible using all the fields relevant.'
        resource_type:
          description: 'ResourceType is the name of the resource.

            `./coderd/rbac/object.go` has the list of valid resource types.'
          allOf:
          - $ref: '#/components/schemas/codersdk.RBACResource'
    codersdk.LoginType:
      type: string
      enum:
      - ''
      - password
      - github
      - oidc
      - token
      - none
    codersdk.RBACAction:
      type: string
      enum:
      - application_connect
      - assign
      - create
      - create_agent
      - delete
      - delete_agent
      - read
      - read_personal
      - ssh
      - share
      - unassign
      - update
      - update_agent
      - update_personal
      - use
      - view_insights
      - start
      - stop
    codersdk.ValidateUserPasswordResponse:
      type: object
      properties:
        details:
          type: string
        valid:
          type: boolean
