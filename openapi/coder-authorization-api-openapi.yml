      - one_time_passcode
      - password
    codersdk.ConvertLoginRequest:
      type: object
      properties:
        password:
          type: string
        to_type:
          description: ToType is the login type to convert to.
          allOf:
          - $ref: '#/components/schemas/codersdk.LoginType'
      required:
      - password
      - to_type
  securitySchemes:
    CoderSessionToken:
      type: apiKey
      in: header
      name: Coder-Session-Token
externalDocs: {}
