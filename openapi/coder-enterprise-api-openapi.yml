    codersdk.AIGatewayKey:
      type: object
      properties:
        created_at:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        key_prefix:
          type: string
        last_used_at:
          type: string
          format: date-time
        name:
          type: string
    codersdk.ACLAvailable:
      type: object
      properties:
        groups:
          type: array
          items:
            $ref: '#/components/schemas/codersdk.Group'
        users:
          type: array
          items:
            $ref: '#/components/schemas/codersdk.ReducedUser'
    codersdk.GroupMembersResponse:
      type: object
      properties:
        count:
          type: integer
        users:
          type: array
          items:
            $ref: '#/components/schemas/codersdk.ReducedUser'
    codersdk.PatchGroupIDPSyncConfigRequest:
      type: object
      properties:
        auto_create_missing_groups:
          type: boolean
        field:
          type: string
        regex_filter:
          $ref: '#/components/schemas/regexp.Regexp'
    codersdk.GroupSyncSettings:
      type: object
      properties:
        auto_create_missing_groups:
          type: boolean
          description: 'AutoCreateMissing controls whether groups returned by the OIDC provider

            are automatically created in Coder if they are missing.'
        field:
          type: string
          description: 'Field is the name of the claim field that specifies what groups a user

            should be in. If empty, no groups will be synced.'
        legacy_group_name_mapping:
          type: object
          description: 'LegacyNameMapping is deprecated. It remaps an IDP group name to

            a Coder group name. Since configuration is now done at runtime,

            group IDs are used to account for group renames.

            For legacy configurations, this config option has to remain.

            Deprecated: Use Mapping instead.'
          additionalProperties:
            type: string
        mapping:
          type: object
          description: Mapping is a map from OIDC groups to Coder group IDs
          additionalProperties:
            type: array
            items:
              type: string
        regex_filter:
          description: 'RegexFilter is a regular expression that filters the groups returned by

            the OIDC provider. Any group not matched by this regex will be ignored.

            If the group filter is nil, then no group filtering will occur.'
          allOf:
          - $ref: '#/components/schemas/regexp.Regexp'
    codersdk.InvalidatePresetsResponse:
      type: object
      properties:
        invalidated:
          type: array
          items:
            $ref: '#/components/schemas/codersdk.InvalidatedPreset'
    codersdk.Feature:
      type: object
      properties:
        actual:
          type: integer
        enabled:
          type: boolean
        entitlement:
          $ref: '#/components/schemas/codersdk.Entitlement'
        limit:
          type: integer
        usage_period:
          description: 'UsagePeriod denotes that the usage is a counter that accumulates over

            this period (and most likely resets with the issuance of the next

            license).


            These dates are determined from the license that this entitlement comes

            from, see enterprise/coderd/license/license.go.


            Only certain features set these fields:

            - FeatureManagedAgentLimit'
          allOf:
          - $ref: '#/components/schemas/codersdk.UsagePeriod'
    codersdk.CryptoKey:
      type: object
      properties:
        deletes_at:
          type: string
          format: date-time
        feature:
          $ref: '#/components/schemas/codersdk.CryptoKeyFeature'
        secret:
          type: string
        sequence:
          type: integer
        starts_at:
          type: string
          format: date-time
    tailcfg.DERPRegion:
      type: object
      properties:
        avoid:
          type: boolean
          description: 'Avoid is whether the client should avoid picking this as its home

            region. The region should only be used if a peer is there.

            Clients already using this region as their home should migrate

            away to a new region without Avoid set.'
        embeddedRelay:
          type: boolean
          description: 'EmbeddedRelay is true when the region is bundled with the Coder

            control plane.'
        nodes:
          type: array
          description: 'Nodes are the DERP nodes running in this region, in

            priority order for the current client. Client TLS

            connections should ideally only go to the first entry

            (falling back to the second if necessary). STUN packets

            should go to the first 1 or 2.


            If nodes within a region route packets amongst themselves,

            but not to other regions. That said, each user/domain

            should get a the same preferred node order, so if all nodes

            for a user/network pick the first one (as they should, when

            things are healthy), the inter-cluster routing is minimal

            to zero.'
          items:
            $ref: '#/components/schemas/tailcfg.DERPNode'
        regionCode:
          type: string
          description: 'RegionCode is a short name for the region. It''s usually a popular

            city or airport code in the region: "nyc", "sf", "sin",

            "fra", etc.'
        regionID:
          type: integer
          description: 'RegionID is a unique integer for a geographic region.


            It corresponds to the legacy derpN.tailscale.com hostnames

            used by older clients. (Older clients will continue to resolve

            derpN.tailscale.com when contacting peers, rather than use

            the server-provided DERPMap)


            RegionIDs must be non-zero, positive, and guaranteed to fit

            in a JavaScript number.


            RegionIDs in range 900-999 are reserved for end users to run their

            own DERP nodes.'
        regionName:
          type: string
          description: 'RegionName is a long English name for the region: "New York City",

            "San Francisco", "Singapore", "Frankfurt", etc.'
    workspaceapps.StatsReport:
      type: object
      properties:
        access_method:
          $ref: '#/components/schemas/workspaceapps.AccessMethod'
        agent_id:
          type: string
        requests:
          type: integer
        session_ended_at:
          type: string
          description: Updated periodically while app is in use active and when the last connection is closed.
        session_id:
          type: string
        session_started_at:
          type: string
        slug_or_port:
          type: string
        user_id:
          type: string
        workspace_id:
          type: string
    codersdk.TemplateGroup:
      type: object
      properties:
        avatar_url:
          type: string
          format: uri
        display_name:
          type: string
        id:
          type: string
          format: uuid
        members:
          type: array
          items:
            $ref: '#/components/schemas/codersdk.ReducedUser'
        name:
          type: string
        organization_display_name:
          type: string
        organization_id:
          type: string
          format: uuid
        organization_name:
          type: string
        quota_allowance:
          type: integer
        role:
          enum:
          - admin
          - use
          allOf:
          - $ref: '#/components/schemas/codersdk.TemplateRole'
        source:
          $ref: '#/components/schemas/codersdk.GroupSource'
        total_member_count:
          type: integer
          description: 'How many members are in this group. Shows the total count,

            even if the user is not authorized to read group member details.

            May be greater than `len(Group.Members)`.'
    codersdk.UserQuietHoursScheduleResponse:
      type: object
      properties:
        next:
          type: string
          format: date-time
          description: Next is the next time that the quiet hours window will start.
        raw_schedule:
          type: string
        time:
          type: string
          description: 'Time is the time of day that the quiet hours window starts in the given

            Timezone each day.'
        timezone:
          type: string
          description: raw format from the cron expression, UTC if unspecified
        user_can_set:
          type: boolean
          description: 'UserCanSet is true if the user is allowed to set their own quiet hours

            schedule. If false, the user cannot set a custom schedule and the default

            schedule will always be used.'
        user_set:
          type: boolean
          description: 'UserSet is true if the user has set their own quiet hours schedule. If

            false, the user is using the default schedule.'
    codersdk.OAuth2ProviderResponseType:
      type: string
      enum:
      - code
      - token
    codersdk.PutOAuth2ProviderAppRequest:
      type: object
      properties:
        callback_url:
          type: string
        icon:
          type: string
        name:
          type: string
      required:
      - callback_url
      - name
    oauth2.Token:
      type: object
      properties:
        access_token:
          type: string
          description: 'AccessToken is the token that authorizes and authenticates

            the requests.'
        expires_in:
          type: integer
          description: 'ExpiresIn is the OAuth2 wire format "expires_in" field,

            which specifies how many seconds later the token expires,

            relative to an unknown time base approximately around "now".

            It is the application''s responsibility to populate

            `Expiry` from `ExpiresIn` when required.'
        expiry:
          type: string
          description: 'Expiry is the optional expiration time of the access token.


            If zero, [TokenSource] implementations will reuse the same

            token forever and RefreshToken or equivalent

            mechanisms for that TokenSource will not be used.'
        refresh_token:
          type: string
          description: 'RefreshToken is a token that''s used by the application

            (as opposed to the user) to refresh the access token

            if it expires.'
        token_type:
          type: string
          description: 'TokenType is the type of token.

            The Type method returns either this or "Bearer", the default.'
    codersdk.OAuth2ClientConfiguration:
      type: object
      properties:
        client_id:
          type: string
        client_id_issued_at:
          type: integer
        client_name:
          type: string
        client_secret_expires_at:
          type: integer
        client_uri:
          type: string
        contacts:
          type: array
          items:
            type: string
        grant_types:
          type: array
          items:
            $ref: '#/components/schemas/codersdk.OAuth2ProviderGrantType'
        jwks:
          type: object
