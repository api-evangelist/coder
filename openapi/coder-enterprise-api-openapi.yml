          type: string
          format: date-time
        id:
          type: string
          format: uuid
        ip:
          type: string
        organization:
          $ref: '#/components/schemas/codersdk.MinimalOrganization'
        ssh_info:
          description: 'SSHInfo is only set when `type` is one of:

            - `ConnectionTypeSSH`

            - `ConnectionTypeReconnectingPTY`

            - `ConnectionTypeVSCode`

            - `ConnectionTypeJetBrains`'
          allOf:
          - $ref: '#/components/schemas/codersdk.ConnectionLogSSHInfo'
        type:
          $ref: '#/components/schemas/codersdk.ConnectionType'
        web_info:
          description: 'WebInfo is only set when `type` is one of:

            - `ConnectionTypePortForwarding`

            - `ConnectionTypeWorkspaceApp`'
          allOf:
          - $ref: '#/components/schemas/codersdk.ConnectionLogWebInfo'
        workspace_id:
          type: string
          format: uuid
        workspace_name:
          type: string
        workspace_owner_id:
          type: string
          format: uuid
        workspace_owner_username:
          type: string
    codersdk.PatchGroupIDPSyncMappingRequest:
      type: object
      properties:
        add:
          type: array
          items:
            type: object
            properties:
              gets:
                type: string
                description: The ID of the Coder resource the user should be added to
              given:
                type: string
                description: The IdP claim the user has
        remove:
          type: array
          items:
            type: object
            properties:
              gets:
                type: string
                description: The ID of the Coder resource the user should be added to
              given:
                type: string
                description: The IdP claim the user has
    codersdk.PatchWorkspaceProxy:
      type: object
      properties:
        display_name:
          type: string
        icon:
          type: string
        id:
          type: string
          format: uuid
        name:
          type: string
        regenerate_token:
          type: boolean
      required:
      - display_name
      - icon
      - id
      - name
    codersdk.Response:
      type: object
      properties:
        detail:
          type: string
          description: 'Detail is a debug message that provides further insight into why the

            action failed. This information can be technical and a regular golang

            err.Error() text.

            - "database: too many open connections"

            - "stat: too many open files"'
        message:
          type: string
          description: 'Message is an actionable message that depicts actions the request took.

            These messages should be fully formed sentences with proper punctuation.

            Examples:

            - "A user has been created."

            - "Failed to create a user."'
        validations:
          type: array
          description: 'Validations are form field-specific friendly error messages. They will be

            shown on a form field in the UI. These can also be used to add additional

            context if there is a set of errors in the primary ''Message''.'
          items:
            $ref: '#/components/schemas/codersdk.ValidationError'
    codersdk.SlimRole:
      type: object
      properties:
        display_name:
          type: string
        name:
          type: string
        organization_id:
          type: string
    codersdk.BannerConfig:
      type: object
      properties:
        background_color:
          type: string
        enabled:
          type: boolean
        message:
          type: string
    wsproxysdk.RegisterWorkspaceProxyRequest:
      type: object
      properties:
        access_url:
          type: string
          description: AccessURL that hits the workspace proxy api.
        derp_enabled:
          type: boolean
          description: 'DerpEnabled indicates whether the proxy should be included in the DERP

            map or not.'
        derp_only:
          type: boolean
          description: 'DerpOnly indicates whether the proxy should only be included in the DERP

            map and should not be used for serving apps.'
        hostname:
          type: string
          description: 'ReplicaHostname is the OS hostname of the machine that the proxy is running

            on.  This is only used for tracking purposes in the replicas table.'
        replica_error:
          type: string
          description: 'ReplicaError is the error that the replica encountered when trying to

            dial it''s peers. This is stored in the replicas table for debugging

            purposes but does not affect the proxy''s ability to register.


            This value is only stored on subsequent requests to the register

            endpoint, not the first request.'
        replica_id:
          type: string
          description: 'ReplicaID is a unique identifier for the replica of the proxy that is

            registering. It should be generated by the client on startup and

            persisted (in memory only) until the process is restarted.'
        replica_relay_address:
          type: string
          description: 'ReplicaRelayAddress is the DERP address of the replica that other

            replicas may use to connect internally for DERP meshing.'
        version:
          type: string
          description: Version is the Coder version of the proxy.
        wildcard_hostname:
          type: string
          description: WildcardHostname that the workspace proxy api is serving for subdomain apps.
    wsproxysdk.ReportAppStatsRequest:
      type: object
      properties:
        stats:
          type: array
          items:
            $ref: '#/components/schemas/workspaceapps.StatsReport'
    codersdk.UpdateUserQuietHoursScheduleRequest:
      type: object
      properties:
        schedule:
          type: string
          description: 'Schedule is a cron expression that defines when the user''s quiet hours

            window is. Schedule must not be empty. For new users, the schedule is set

            to 2am in their browser or computer''s timezone. The schedule denotes the

            beginning of a 4 hour window where the workspace is allowed to

            automatically stop or restart due to maintenance or template schedule.


            The schedule must be daily with a single time, and should have a timezone

            specified via a CRON_TZ prefix (otherwise UTC will be used).


            If the schedule is empty, the user will be updated to use the default

            schedule.'
      required:
      - schedule
    codersdk.PatchOrganizationIDPSyncMappingRequest:
      type: object
      properties:
        add:
          type: array
          items:
            type: object
            properties:
              gets:
                type: string
                description: The ID of the Coder resource the user should be added to
              given:
                type: string
                description: The IdP claim the user has
        remove:
          type: array
          items:
            type: object
            properties:
              gets:
                type: string
                description: The ID of the Coder resource the user should be added to
              given:
                type: string
                description: The IdP claim the user has
    workspaceapps.Request:
      type: object
      properties:
        access_method:
          $ref: '#/components/schemas/workspaceapps.AccessMethod'
        agent_name_or_id:
          type: string
          description: AgentNameOrID is not required if the workspace has only one agent.
        app_prefix:
          type: string
          description: 'Prefix is the prefix of the subdomain app URL. Prefix should have a

            trailing "---" if set.'
        app_slug_or_port:
          type: string
        base_path:
          type: string
          description: 'BasePath of the app. For path apps, this is the path prefix in the router

            for this particular app. For subdomain apps, this should be "/". This is

            used for setting the cookie path.'
        username_or_id:
          type: string
          description: 'For the following fields, if the AccessMethod is AccessMethodTerminal,

            then only AgentNameOrID may be set and it must be a UUID. The other

            fields must be left blank.'
        workspace_name_or_id:
          type: string
    codersdk.ValidationError:
      type: object
      properties:
        detail:
          type: string
        field:
          type: string
      required:
      - detail
      - field
    codersdk.AppearanceConfig:
      type: object
      properties:
        announcement_banners:
          type: array
          items:
            $ref: '#/components/schemas/codersdk.BannerConfig'
        application_name:
          type: string
        docs_url:
          type: string
        logo_url:
          type: string
        service_banner:
          description: 'Deprecated: ServiceBanner has been replaced by AnnouncementBanners.'
          allOf:
          - $ref: '#/components/schemas/codersdk.BannerConfig'
        support_links:
          type: array
          items:
            $ref: '#/components/schemas/codersdk.LinkConfig'
    codersdk.Entitlements:
      type: object
