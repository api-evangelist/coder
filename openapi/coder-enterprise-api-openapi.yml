          type: array
          items:
            type: string
        features:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/codersdk.Feature'
        has_license:
          type: boolean
        refreshed_at:
          type: string
          format: date-time
        require_telemetry:
          type: boolean
        trial:
          type: boolean
        warnings:
          type: array
          items:
            type: string
