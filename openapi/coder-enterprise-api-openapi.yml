      - Enterprise
      security:
      - CoderSessionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/codersdk.OAuth2ClientRegistrationRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.OAuth2ClientRegistrationResponse'
  /oauth2/revoke:
    post:
      operationId: oauth2-token-revocation
      summary: Revoke OAuth2 tokens (RFC 7009).
      tags:
      - Enterprise
      security:
      - CoderSessionToken: []
      parameters:
      - name: client_id
        in: formData
        required: true
        description: Client ID for authentication
        schema:
          type: string
      - name: token
        in: formData
        required: true
        description: The token to revoke
        schema:
          type: string
      - name: token_type_hint
        in: formData
        required: false
        description: Hint about token type (access_token or refresh_token)
        schema:
          type: string
      responses:
        '200':
          description: Token successfully revoked
  /oauth2/tokens:
    post:
      operationId: oauth2-token-exchange
      summary: OAuth2 token exchange.
      tags:
      - Enterprise
      security:
      - CoderSessionToken: []
      parameters:
      - name: client_id
        in: formData
        required: false
        description: Client ID, required if grant_type=authorization_code
        schema:
          type: string
      - name: client_secret
        in: formData
        required: false
        description: Client secret, required if grant_type=authorization_code
        schema:
          type: string
      - name: code
        in: formData
        required: false
        description: Authorization code, required if grant_type=authorization_code
        schema:
          type: string
      - name: refresh_token
        in: formData
        required: false
        description: Refresh token, required if grant_type=refresh_token
        schema:
          type: string
      - name: grant_type
        in: formData
        required: true
        description: Grant type
        schema:
          type: string
          enum:
          - authorization_code
          - refresh_token
          - password
          - client_credentials
          - implicit
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/oauth2.Token'
    delete:
      operationId: delete-oauth2-application-tokens
      summary: Delete OAuth2 application tokens.
      tags:
      - Enterprise
      security:
      - CoderSessionToken: []
      parameters:
      - name: client_id
        in: query
        required: true
        description: Client ID
        schema:
          type: string
      responses:
        '204':
          description: No Content
  /scim/v2/ServiceProviderConfig:
    get:
      operationId: scim-get-service-provider-config
      summary: 'SCIM 2.0: Service Provider Config'
      tags:
      - Enterprise
      security:
      - CoderSessionToken: []
      responses:
        '200':
          description: OK
  /scim/v2/Users:
    get:
      operationId: scim-get-users
      summary: 'SCIM 2.0: Get users'
      tags:
      - Enterprise
      security:
      - Authorization: []
      responses:
        '200':
          description: OK
    post:
      operationId: scim-create-new-user
      summary: 'SCIM 2.0: Create new user'
      tags:
      - Enterprise
      security:
      - Authorization: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/legacyscim.SCIMUser'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/legacyscim.SCIMUser'
  /scim/v2/Users/{id}:
    get:
      operationId: scim-get-user-by-id
      summary: 'SCIM 2.0: Get user by ID'
      tags:
      - Enterprise
      security:
      - Authorization: []
      parameters:
      - name: id
        in: path
        required: true
        description: User ID
        schema:
          type: string
      responses:
        '404':
          description: Not Found
    put:
      operationId: scim-replace-user-status
      summary: 'SCIM 2.0: Replace user account'
      tags:
      - Enterprise
      security:
      - Authorization: []
      parameters:
      - name: id
        in: path
        required: true
        description: User ID
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/legacyscim.SCIMUser'
      responses:
        '200':
          description: OK
          content:
            application/scim+json:
              schema:
                $ref: '#/components/schemas/codersdk.User'
    patch:
      operationId: scim-update-user-status
      summary: 'SCIM 2.0: Update user account'
      tags:
      - Enterprise
      security:
      - Authorization: []
      parameters:
      - name: id
        in: path
        required: true
        description: User ID
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/legacyscim.SCIMUser'
      responses:
        '200':
          description: OK
          content:
            application/scim+json:
              schema:
                $ref: '#/components/schemas/codersdk.User'
components:
  schemas:
    codersdk.TemplateUser:
      type: object
