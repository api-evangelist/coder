            type: string
        registration_access_token:
          type: string
        registration_client_uri:
          type: string
        response_types:
          type: array
          items:
            $ref: '#/components/schemas/codersdk.OAuth2ProviderResponseType'
        scope:
          type: string
        software_id:
          type: string
        software_version:
          type: string
        token_endpoint_auth_method:
