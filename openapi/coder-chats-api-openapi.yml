openapi: 3.0.3
info:
  description: Coderd is the service created by running coder server. It is a thin API that connects workspaces, provisioners and users. coderd stores its state in Postgres and is the only service that communicates with Postgres.
  title: Coder Agents Chats API
  termsOfService: https://coder.com/legal/terms-of-service
  contact:
    name: API Support
    url: https://coder.com
    email: support@coder.com
  license:
    name: AGPL-3.0
    url: https://github.com/coder/coder/blob/main/LICENSE
  version: '2.0'
servers:
- url: https://{coderHost}/api/v2
  description: Coder instance
  variables:
    coderHost:
      default: coder.example.com
      description: Your Coder deployment hostname
security:
- CoderSessionToken: []
tags:
- name: Chats
paths:
  /api/experimental/chats:
    get:
      operationId: list-chats
      summary: List chats
      tags:
      - Chats
      security:
      - CoderSessionToken: []
      description: 'Experimental: this endpoint is subject to change.'
      parameters:
      - name: q
        in: query
        required: false
        description: Search query. Supports title:<substring> (case-insensitive, quote multi-word values), archived:bool, has_unread:bool, pr_status:<draft\|open\|merged\|closed> as repeated or comma-separated values, source:<created_by_me\|shared_with_me>, diff_url:<url> (quote values containing colons), pr:<number> (exact PR number match), repo:<owner/repo> (case-insensitive substring match against git remote origin or URL), pr_title:<text> (case-insensitive PR title substring). Bare terms are not supported; use title:<value> for title filtering.
        schema:
          type: string
      - name: label
        in: query
        required: false
        description: Filter by label as key:value. Repeat for multiple (AND logic).
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/codersdk.Chat'
    post:
      operationId: create-chat
      summary: Create chat
      tags:
      - Chats
      security:
      - CoderSessionToken: []
      description: 'Experimental: this endpoint is subject to change.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/codersdk.CreateChatRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.Chat'
  /api/experimental/chats/config/retention-days:
    get:
      operationId: get-chat-retention-days
      summary: Get chat retention days
      tags:
      - Chats
      security:
      - CoderSessionToken: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.ChatRetentionDaysResponse'
    put:
      operationId: update-chat-retention-days
      summary: Update chat retention days
      tags:
      - Chats
      security:
      - CoderSessionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/codersdk.UpdateChatRetentionDaysRequest'
      responses:
        '204':
          description: No Content
  /api/experimental/chats/files:
    post:
      operationId: upload-chat-file
      summary: Upload chat file
      tags:
      - Chats
      security:
      - CoderSessionToken: []
      description: 'Experimental: this endpoint is subject to change.'
      parameters:
      - name: organization
        in: query
        required: true
        description: Organization ID
        schema:
          type: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.UploadChatFileResponse'
  /api/experimental/chats/files/{file}:
    get:
      operationId: get-chat-file
      summary: Get chat file
      tags:
      - Chats
      security:
      - CoderSessionToken: []
      description: 'Experimental: this endpoint is subject to change.'
      parameters:
      - name: file
        in: path
        required: true
        description: File ID
        schema:
          type: string
      responses:
        '200':
          description: OK
  /api/experimental/chats/insights/pull-requests:
    get:
      operationId: get-pr-insights
      summary: Get PR insights
      tags:
      - Chats
      security:
      - CoderSessionToken: []
      parameters:
      - name: start_date
        in: query
        required: true
        description: Start date (RFC3339)
        schema:
          type: string
      - name: end_date
        in: query
        required: true
        description: End date (RFC3339)
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.PRInsightsResponse'
  /api/experimental/chats/models:
    get:
      operationId: list-chat-models
      summary: List chat models
      tags:
      - Chats
      security:
      - CoderSessionToken: []
      description: 'Experimental: this endpoint is subject to change.'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.ChatModelsResponse'
  /api/experimental/chats/watch:
    get:
      operationId: watch-chat-events-for-a-user-via-websockets
      summary: Watch chat events for a user via WebSockets
      tags:
      - Chats
      security:
      - CoderSessionToken: []
      description: 'Experimental: this endpoint is subject to change.'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.ChatWatchEvent'
  /api/experimental/chats/{chat}:
    get:
      operationId: get-chat-by-id
      summary: Get chat by ID
      tags:
      - Chats
      security:
      - CoderSessionToken: []
      description: 'Experimental: this endpoint is subject to change.'
      parameters:
      - name: chat
        in: path
        required: true
        description: Chat ID
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.Chat'
    patch:
      operationId: update-chat
      summary: Update chat
      tags:
      - Chats
      security:
      - CoderSessionToken: []
      description: 'Experimental: this endpoint is subject to change.'
      parameters:
      - name: chat
        in: path
        required: true
        description: Chat ID
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/codersdk.UpdateChatRequest'
      responses:
        '204':
          description: No Content
  /api/experimental/chats/{chat}/acl:
    get:
      operationId: get-chat-acls
      summary: Get chat ACLs
      tags:
      - Chats
      security:
      - CoderSessionToken: []
      description: 'Experimental: this endpoint is subject to change.'
      parameters:
      - name: chat
        in: path
        required: true
        description: Chat ID
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.ChatACL'
    patch:
      operationId: update-chat-acl
      summary: Update chat ACL
      tags:
      - Chats
      security:
      - CoderSessionToken: []
      description: 'Experimental: this endpoint is subject to change.'
      parameters:
      - name: chat
        in: path
        required: true
        description: Chat ID
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/codersdk.UpdateChatACL'
      responses:
        '204':
          description: No Content
  /api/experimental/chats/{chat}/diff:
    get:
      operationId: get-chat-diff-contents
      summary: Get chat diff contents
      tags:
      - Chats
      security:
      - CoderSessionToken: []
      description: 'Experimental: this endpoint is subject to change.'
      parameters:
      - name: chat
        in: path
        required: true
        description: Chat ID
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.ChatDiffContents'
  /api/experimental/chats/{chat}/interrupt:
    post:
      operationId: interrupt-chat
      summary: Interrupt chat
      tags:
      - Chats
      security:
      - CoderSessionToken: []
      description: 'Experimental: this endpoint is subject to change.'
      parameters:
      - name: chat
        in: path
        required: true
        description: Chat ID
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.Chat'
  /api/experimental/chats/{chat}/messages:
    get:
      operationId: list-chat-messages
      summary: List chat messages
      tags:
      - Chats
      security:
      - CoderSessionToken: []
      description: 'Experimental: this endpoint is subject to change.'
      parameters:
      - name: chat
        in: path
        required: true
        description: Chat ID
        schema:
          type: string
      - name: before_id
        in: query
        required: false
        description: Return messages with id < before_id
        schema:
          type: integer
      - name: after_id
        in: query
        required: false
        description: Return messages with id > after_id
        schema:
          type: integer
      - name: limit
        in: query
        required: false
        description: Page size, 1 to 200. Defaults to 50.
        schema:
          type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.ChatMessagesResponse'
    post:
      operationId: send-chat-message
      summary: Send chat message
      tags:
      - Chats
      security:
      - CoderSessionToken: []
      description: 'Experimental: this endpoint is subject to change.'
      parameters:
      - name: chat
        in: path
        required: true
        description: Chat ID
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/codersdk.CreateChatMessageRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.CreateChatMessageResponse'
  /api/experimental/chats/{chat}/messages/{message}:
    patch:
      operationId: edit-chat-message
      summary: Edit chat message
      tags:
      - Chats
      security:
      - CoderSessionToken: []
      description: 'Experimental: this endpoint is subject to change.'
      parameters:
      - name: chat
        in: path
        required: true
        description: Chat ID
        schema:
          type: string
      - name: message
        in: path
        required: true
        description: Message ID
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/codersdk.EditChatMessageRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.EditChatMessageResponse'
  /api/experimental/chats/{chat}/prompts:
    get:
      operationId: list-chat-user-prompts
      summary: List chat user prompts
      tags:
      - Chats
      security:
      - CoderSessionToken: []
      description: 'Experimental: this endpoint is subject to change.


        Returns the user-authored prompts in a chat, newest first,

        with each prompt''s text parts concatenated in the order they

        were authored. Used by the composer to power the up/down

        arrow prompt-history cycle without paging through every

        message in the chat.'
      parameters:
      - name: chat
        in: path
        required: true
        description: Chat ID
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: Page size, 0 to 2000. 0 (the default) means the server-side default of 500.
        schema:
          type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.ChatPromptsResponse'
  /api/experimental/chats/{chat}/reconcile-invalid:
    post:
      operationId: reconcile-invalid-chat-state
      summary: Reconcile invalid chat state
      tags:
      - Chats
      security:
      - CoderSessionToken: []
      description: 'Experimental: this endpoint is subject to change.'
      parameters:
      - name: chat
        in: path
        required: true
        description: Chat ID
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.Chat'
  /api/experimental/chats/{chat}/stream:
    get:
      operationId: stream-chat-events-via-websockets
      summary: Stream chat events via WebSockets
      tags:
      - Chats
      security:
      - CoderSessionToken: []
      description: 'Experimental: this endpoint is subject to change.'
      parameters:
      - name: chat
        in: path
        required: true
        description: Chat ID
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.ChatStreamEvent'
  /api/experimental/chats/{chat}/stream/desktop:
    get:
      operationId: connect-to-chat-workspace-desktop-via-websockets
      summary: Connect to chat workspace desktop via WebSockets
      tags:
      - Chats
      security:
      - CoderSessionToken: []
      description: 'Raw binary WebSocket stream of the chat workspace desktop.

        Experimental: this endpoint is subject to change.'
      parameters:
      - name: chat
        in: path
        required: true
        description: Chat ID
        schema:
          type: string
      responses:
        '101':
          description: Switching Protocols
  /api/experimental/chats/{chat}/stream/git:
    get:
      operationId: watch-chat-workspace-git-state-via-websockets
      summary: Watch chat workspace git state via WebSockets
      tags:
      - Chats
      security:
      - CoderSessionToken: []
      description: 'Experimental: this endpoint is subject to change.'
      parameters:
      - name: chat
        in: path
        required: true
        description: Chat ID
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.WorkspaceAgentGitServerMessage'
  /api/experimental/chats/{chat}/stream/parts:
    get:
      operationId: stream-chat-parts-via-websockets
      summary: Stream chat parts via WebSockets
      tags:
      - Chats
      security:
      - CoderSessionToken: []
      description: 'Experimental: this endpoint is subject to change.'
      parameters:
      - name: chat
        in: path
        required: true
        description: Chat ID
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.ChatStreamEvent'
  /api/experimental/chats/{chat}/title/regenerate:
    post:
      operationId: regenerate-chat-title
      summary: Regenerate chat title
      tags:
      - Chats
      security:
      - CoderSessionToken: []
      description: 'Experimental: this endpoint is subject to change.'
      parameters:
      - name: chat
        in: path
        required: true
        description: Chat ID
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/codersdk.Chat'
components:
  schemas:
    codersdk.ChatDiffStatus:
      type: object
      properties:
        additions:
          type: integer
        approved:
          type: boolean
        author_avatar_url:
          type: string
        author_login:
          type: string
        base_branch:
          type: string
        changed_files:
          type: integer
        changes_requested:
          type: boolean
        chat_id:
          type: string
          format: uuid
        commits:
          type: integer
        deletions:
          type: integer
        head_branch:
          type: string
        pr_number:
          type: integer
        pull_request_draft:
          type: boolean
        pull_request_state:
          type: string
        pull_request_title:
          type: string
        refreshed_at:
          type: string
          format: date-time
        reviewer_count:
          type: integer
        stale_at:
          type: string
          format: date-time
        url:
          type: string
    codersdk.ChatModelProviderUnavailableReason:
      type: string
      enum:
      - missing_api_key
      - fetch_failed
      - user_api_key_required
    codersdk.ChatRetentionDaysResponse:
      type: object
      properties:
        retention_days:
          type: integer
    codersdk.ChatInputPart:
      type: object
      properties:
        content:
          type: string
          description: The code content from the diff that was commented on.
        end_line:
          type: integer
        file_id:
          type: string
          format: uuid
        file_name:
          type: string
          description: 'The following fields are only set when Type is

            ChatInputPartTypeFileReference.'
        start_line:
          type: integer
        text:
          type: string
        type:
          $ref: '#/components/schemas/codersdk.ChatInputPartType'
    codersdk.ChatGroup:
      type: object
      properties:
        avatar_url:
          type: string
          format: uri
        display_name:
          type: string
        id:
          type: string
          format: uuid
        members:
          type: array
          items:
            $ref: '#/components/schemas/codersdk.ReducedUser'
        name:
          type: string
        organization_display_name:
          type: string
        organization_id:
          type: string
          format: uuid
        organization_name:
          type: string
        quota_allowance:
          type: integer
        role:
          enum:
          - read
          allOf:
          - $ref: '#/components/schemas/codersdk.ChatRole'
        source:
          $ref: '#/components/schemas/codersdk.GroupSource'
        total_member_count:
          type: integer
          description: 'How many members are in this group. Shows the total count,

            even if the user is not authorized to read group member details.

            May be greater than `len(Group.Members)`.'
    codersdk.UpdateChatACL:
      type: object
      properties:
        group_roles:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/codersdk.ChatRole'
        user_roles:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/codersdk.ChatRole'
    codersdk.CreateChatRequest:
      type: object
      properties:
        client_type:
          $ref: '#/components/schemas/codersdk.ChatClientType'
        content:
          type: array
          items:
            $ref: '#/components/schemas/codersdk.ChatInputPart'
        labels:
          type: object
          additionalProperties:
            type: string
        mcp_server_ids:
          type: array
          items:
            type: string
            format: uuid
        model_config_id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        plan_mode:
          $ref: '#/components/schemas/codersdk.ChatPlanMode'
        system_prompt:
          type: string
        unsafe_dynamic_tools:
          type: array
          description: 'UnsafeDynamicTools declares client-executed tools that the

            LLM can invoke. This API is highly experimental and highly

            subject to change.'
          items:
            $ref: '#/components/schemas/codersdk.DynamicTool'
        workspace_id:
          type: string
          format: uuid
    codersdk.ChatStatus:
      type: string
      enum:
      - waiting
      - pending
      - running
      - paused
      - completed
      - error
      - requires_action
      - interrupting
    codersdk.ChatInputPartType:
      type: string
      enum:
      - text
      - file
      - file-reference
    codersdk.ReducedUser:
      type: object
      properties:
        avatar_url:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time
        email:
          type: string
          format: email
        id:
          type: string
          format: uuid
        is_service_account:
          type: boolean
        last_seen_at:
          type: string
          format: date-time
        login_type:
          $ref: '#/components/schemas/codersdk.LoginType'
        name:
          type: string
        status:
          enum:
          - active
          - suspended
          allOf:
          - $ref: '#/components/schemas/codersdk.UserStatus'
        theme_preference:
          type: string
          description: 'Deprecated: this value should be retrieved from

            `codersdk.UserPreferenceSettings` instead.'
        updated_at:
          type: string
          format: date-time
        username:
          type: string
      required:
      - created_at
      - email
      - id
      - username
    codersdk.ChatPlanMode:
      type: string
      enum:
      - plan
    codersdk.ChatModelProvider:
      type: object
      properties:
        available:
          type: boolean
        models:
          type: array
          items:
            $ref: '#/components/schemas/codersdk.ChatModel'
        provider:
          type: string
        unavailable_reason:
          $ref: '#/components/schemas/codersdk.ChatModelProviderUnavailableReason'
    codersdk.UserStatus:
      type: string
      enum:
      - active
      - dormant
      - suspended
    uuid.NullUUID:
      type: object
      properties:
        uuid:
          type: string
        valid:
          type: boolean
          description: Valid is true if UUID is not NULL
    codersdk.ChatMessageUsage:
      type: object
      properties:
        cache_creation_tokens:
          type: integer
        cache_read_tokens:
          type: integer
        context_limit:
          type: integer
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        reasoning_tokens:
          type: integer
        total_tokens:
          type: integer
    codersdk.GroupSource:
      type: string
      enum:
      - user
      - oidc
    codersdk.ChatStreamActionRequired:
      type: object
      properties:
        tool_calls:
          type: array
          items:
            $ref: '#/components/schemas/codersdk.ChatStreamToolCall'
    codersdk.ChatModel:
      type: object
      properties:
        display_name:
          type: string
        id:
          type: string
        model:
          type: string
        provider:
          type: string
    codersdk.ChatErrorKind:
      type: string
      enum:
      - generic
      - overloaded
      - rate_limit
      - timeout
      - stream_silence_timeout
      - auth
      - config
      - usage_limit
      - missing_key
      - provider_disabled
    codersdk.ChatFileMetadata:
      type: object
      properties:
        created_at:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        mime_type:
          type: string
        name:
          type: string
        organization_id:
          type: string
          format: uuid
        owner_id:
          type: string
          format: uuid
    codersdk.ChatWatchEventKind:
      type: string
      enum:
      - status_change
      - summary_change
      - title_change
      - created
      - deleted
      - diff_status_change
      - action_required
    codersdk.ChatStreamEvent:
      type: object
      properties:
        action_required:
          $ref: '#/components/schemas/codersdk.ChatStreamActionRequired'
        chat_id:
          type: string
          format: uuid
        error:
          $ref: '#/components/schemas/codersdk.ChatError'
        message:
          $ref: '#/components/schemas/codersdk.ChatMessage'
        message_part:
          $ref: '#/components/schemas/codersdk.ChatStreamMessagePart'
        queued_messages:
          type: array
          items:
            $ref: '#/components/schemas/codersdk.ChatQueuedMessage'
        retry:
          $ref: '#/components/schemas/codersdk.ChatStreamRetry'
        status:
          $ref: '#/components/schemas/codersdk.ChatStreamStatus'
        type:
          $ref: '#/components/schemas/codersdk.ChatStreamEventType'
    codersdk.ChatMessage:
      type: object
      properties:
        chat_id:
          type: string
          format: uuid
        content:
          type: array
          items:
            $ref: '#/components/schemas/codersdk.ChatMessagePart'
        created_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid
        id:
          type: integer
        model_config_id:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/codersdk.ChatMessageRole'
        usage:
          $ref: '#/components/schemas/codersdk.ChatMessageUsage'
    codersdk.PRInsightsModelBreakdown:
      type: object
      properties:
        cost_per_merged_pr_micros:
