    codersdk.UploadChatFileResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
    codersdk.ChatMessagePart:
      type: object
      properties:
        args:
          type: array
          items:
            type: integer
        args_delta:
          type: string
        completed_at:
          type: string
          format: date-time
          description: 'CompletedAt is the time a reasoning part finished streaming,

            so reasoning duration can be computed as completed_at minus

            created_at. For interrupted reasoning, this is the

            interruption time. Absent when reasoning timestamp data was

            not recorded (e.g. messages persisted before this feature

            was added).'
        content:
          type: string
          description: The code content from the diff that was commented on.
        context_file_agent_id:
          format: uuid
          description: 'ContextFileAgentID is the workspace agent that provided

            this context file. Used to detect when the agent changes

            (e.g. workspace rebuilt) so instruction files can be

            re-persisted with fresh content.'
          allOf:
          - $ref: '#/components/schemas/uuid.NullUUID'
        context_file_content:
          type: string
          description: 'ContextFileContent holds the file content sent to the LLM.

            Internal only: stripped before API responses to keep

            payloads small. The backend reads it when building the

            prompt via partsToMessageParts.'
        context_file_directory:
          type: string
          description: 'ContextFileDirectory is the working directory of the

            workspace agent. Internal only: same purpose as

            ContextFileOS.'
        context_file_os:
          type: string
          description: 'ContextFileOS is the operating system of the workspace

            agent. Internal only: used during prompt expansion so

            the LLM knows the OS even on turns where InsertSystem

            is not called.'
        context_file_path:
          type: string
          description: 'ContextFilePath is the absolute path of a file loaded into

            the LLM context (e.g. an AGENTS.md instruction file).'
        context_file_skill_meta_file:
          type: string
          description: 'ContextFileSkillMetaFile is the basename of the skill

            meta file (e.g. "SKILL.md") at the time of persistence.

            Internal only: restored on subsequent turns so the

            read_skill tool uses the correct filename even when the

            agent configured a non-default value.'
        context_file_truncated:
          type: boolean
          description: 'ContextFileTruncated indicates the file exceeded the 64KiB

            instruction file limit and was truncated.'
        created_at:
          type: string
          format: date-time
          description: 'CreatedAt is the timestamp this part carries. The semantics

            depend on the part type: for tool-call and tool-result parts

            it is the time the call was emitted or the result was

            produced (tool duration is the result''s created_at minus the

            call''s created_at); for reasoning parts it is the time

            reasoning started streaming.'
        data:
          type: array
          items:
            type: integer
        end_line:
          type: integer
        file_id:
          format: uuid
          allOf:
          - $ref: '#/components/schemas/uuid.NullUUID'
        file_name:
          type: string
        is_error:
          type: boolean
        is_media:
          type: boolean
        mcp_server_config_id:
          format: uuid
          allOf:
          - $ref: '#/components/schemas/uuid.NullUUID'
        media_type:
          type: string
        name:
          type: string
        parsed_commands:
          type: array
          description: 'ParsedCommands holds parsed programs from an execute tool call''s

            shell command, one entry per simple command in source order. Each

            entry is [program] or [program, arg] where arg is the first non-flag

            positional argument. Program names are normalized to their base

            name (e.g. /usr/bin/go becomes go). Only populated when ToolName

            is "execute" and the command parses successfully; nil otherwise.'
          items:
            type: array
            items:
              type: string
        provider_executed:
          type: boolean
          description: 'ProviderExecuted indicates the tool call was executed by

            the provider (e.g. Anthropic computer use).'
        provider_metadata:
          type: array
          description: 'ProviderMetadata holds provider-specific response metadata

            (e.g. Anthropic cache control hints) as raw JSON. Internal

            only: stripped by db2sdk before API responses.'
          items:
            type: integer
        result:
          type: array
          items:
            type: integer
        result_delta:
          type: string
        result_reset:
          type: boolean
        signature:
          type: string
        skill_description:
          type: string
          description: 'SkillDescription is the short description from the skill''s

            SKILL.md frontmatter.'
        skill_dir:
          type: string
          description: 'SkillDir is the absolute path to the skill directory inside

            the workspace filesystem. Internal only: used by

            read_skill/read_skill_file tools to locate skill files.'
        skill_name:
          type: string
          description: 'SkillName is the kebab-case name of a discovered skill

            from the workspace''s .agents/skills/ directory.'
        source_id:
          type: string
        start_line:
          type: integer
        text:
          type: string
        title:
          type: string
        tool_call_id:
          type: string
        tool_name:
          type: string
        type:
          $ref: '#/components/schemas/codersdk.ChatMessagePartType'
        url:
          type: string
