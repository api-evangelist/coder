            Example: `CRON_TZ=US/Central 30 9 * * 1-5` represents 0930 in the timezone US/Central

            on weekdays (Mon-Fri). `CRON_TZ` defaults to UTC if not present.'
    codersdk.WorkspaceApp:
      type: object
      properties:
        command:
          type: string
