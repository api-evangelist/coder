          type: string
        name:
          type: string
    codersdk.CORSBehavior:
      type: string
      enum:
      - simple
      - passthru
    codersdk.CreateTemplateRequest:
      type: object
      properties:
        activity_bump_ms:
          type: integer
          description: 'ActivityBumpMillis allows optionally specifying the activity bump

            duration for all workspaces created from this template. Defaults to 1h

            but can be set to 0 to disable activity bumping.'
        allow_user_autostart:
          type: boolean
          description: 'AllowUserAutostart allows users to set a schedule for autostarting their

            workspace. By default this is true. This can only be disabled when using

            an enterprise license.'
        allow_user_autostop:
          type: boolean
          description: 'AllowUserAutostop allows users to set a custom workspace TTL to use in

            place of the template''s DefaultTTL field. By default this is true. If

            false, the DefaultTTL will always be used. This can only be disabled when

            using an enterprise license.'
        allow_user_cancel_workspace_jobs:
          type: boolean
          description: 'Allow users to cancel in-progress workspace jobs.

            *bool as the default value is "true".'
        autostart_requirement:
          description: 'AutostartRequirement allows optionally specifying the autostart allowed days

            for workspaces created from this template. This is an enterprise feature.'
          allOf:
          - $ref: '#/components/schemas/codersdk.TemplateAutostartRequirement'
        autostop_requirement:
          description: 'AutostopRequirement allows optionally specifying the autostop requirement

            for workspaces created from this template. This is an enterprise feature.'
          allOf:
          - $ref: '#/components/schemas/codersdk.TemplateAutostopRequirement'
        cors_behavior:
          description: CORSBehavior allows optionally specifying the CORS behavior for all shared ports.
          allOf:
          - $ref: '#/components/schemas/codersdk.CORSBehavior'
        default_ttl_ms:
          type: integer
          description: 'DefaultTTLMillis allows optionally specifying the default TTL

            for all workspaces created from this template.'
        delete_ttl_ms:
          type: integer
          description: 'TimeTilDormantAutoDeleteMillis allows optionally specifying the max lifetime before Coder

            permanently deletes dormant workspaces created from this template.'
        description:
          type: string
          description: 'Description is a description of what the template contains. It must be

            less than 128 bytes.'
        disable_everyone_group_access:
          type: boolean
          description: 'DisableEveryoneGroupAccess allows optionally disabling the default

            behavior of granting the ''everyone'' group access to use the template.

            If this is set to true, the template will not be available to all users,

            and must be explicitly granted to users or groups in the permissions settings

            of the template.'
        display_name:
          type: string
          description: DisplayName is the displayed name of the template.
        dormant_ttl_ms:
          type: integer
          description: 'TimeTilDormantMillis allows optionally specifying the max lifetime before Coder

            locks inactive workspaces created from this template.'
        failure_ttl_ms:
          type: integer
          description: 'FailureTTLMillis allows optionally specifying the max lifetime before Coder

            stops all resources for failed workspaces created from this template.'
        icon:
          type: string
          description: 'Icon is a relative path or external URL that specifies

            an icon to be displayed in the dashboard.'
        max_port_share_level:
          description: 'MaxPortShareLevel allows optionally specifying the maximum port share level

            for workspaces created from the template.'
          allOf:
          - $ref: '#/components/schemas/codersdk.WorkspaceAgentPortShareLevel'
        name:
          type: string
          description: Name is the name of the template.
        require_active_version:
          type: boolean
          description: 'RequireActiveVersion mandates that workspaces are built with the active

            template version.'
        template_use_classic_parameter_flow:
          type: boolean
          description: 'UseClassicParameterFlow allows optionally specifying whether

            the template should use the classic parameter flow. The default if unset is

            true, and is why `*bool` is used here. When dynamic parameters becomes

            the default, this will default to false.'
        template_version_id:
          type: string
          format: uuid
          description: 'VersionID is an in-progress or completed job to use as an initial version

            of the template.


            This is required on creation to enable a user-flow of validating a

            template works. There is no reason the data-model cannot support empty

            templates, but it doesn''t make sense for users.'
      required:
      - name
      - template_version_id
    codersdk.JobErrorCode:
      type: string
      enum:
      - REQUIRED_TEMPLATE_VARIABLES
      - INSUFFICIENT_QUOTA
    codersdk.ProvisionerJobInput:
      type: object
