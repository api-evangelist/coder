        sensitive:
          type: boolean
        value:
          type: string
    codersdk.TemplateAutostopRequirement:
      type: object
      properties:
        days_of_week:
          type: array
          description: 'DaysOfWeek is a list of days of the week on which restarts are required.

            Restarts happen within the user''s quiet hours (in their configured

            timezone). If no days are specified, restarts are not required. Weekdays

            cannot be specified twice.


            Restarts will only happen on weekdays in this list on weeks which line up

            with Weeks.'
          items:
            type: string
            enum:
            - monday
            - tuesday
            - wednesday
            - thursday
            - friday
            - saturday
            - sunday
        weeks:
          type: integer
          description: 'Weeks is the number of weeks between required restarts. Weeks are synced

            across all workspaces (and Coder deployments) using modulo math on a

            hardcoded epoch week of January 2nd, 2023 (the first Monday of 2023).

            Values of 0 or 1 indicate weekly restarts. Values of 2 indicate

            fortnightly restarts, etc.'
    codersdk.MatchedProvisioners:
      type: object
      properties:
        available:
          type: integer
          description: 'Available is the number of provisioner daemons that are available to

            take jobs. This may be less than the count if some provisioners are

            busy or have been stopped.'
        count:
          type: integer
          description: 'Count is the number of provisioner daemons that matched the given

            tags. If the count is 0, it means no provisioner daemons matched the

            requested tags.'
        most_recently_seen:
          type: string
          format: date-time
          description: 'MostRecentlySeen is the most recently seen time of the set of matched

            provisioners. If no provisioners matched, this field will be null.'
    codersdk.CreateTemplateVersionRequest:
      type: object
