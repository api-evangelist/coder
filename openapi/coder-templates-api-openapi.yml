          type: string
          description: Reason is a human-readable explanation of the agent's health. It is empty if Healthy is true.
          example: agent has lost connection
    codersdk.ArchiveTemplateVersionsRequest:
      type: object
      properties:
        all:
          type: boolean
          description: 'By default, only failed versions are archived. Set this to true

            to archive all unused versions regardless of job status.'
    codersdk.UpdateTemplateMeta:
      type: object
      properties:
        activity_bump_ms:
          type: integer
          description: 'ActivityBumpMillis allows optionally specifying the activity bump

            duration for all workspaces created from this template. Defaults to 1h

            but can be set to 0 to disable activity bumping.'
        allow_user_autostart:
          type: boolean
        allow_user_autostop:
          type: boolean
        allow_user_cancel_workspace_jobs:
          type: boolean
        autostart_requirement:
          $ref: '#/components/schemas/codersdk.TemplateAutostartRequirement'
        autostop_requirement:
          description: 'AutostopRequirement and AutostartRequirement can only be set if your license

            includes the advanced template scheduling feature. If you attempt to set this

            value while unlicensed, it will be ignored.'
          allOf:
          - $ref: '#/components/schemas/codersdk.TemplateAutostopRequirement'
        cors_behavior:
          $ref: '#/components/schemas/codersdk.CORSBehavior'
        default_ttl_ms:
          type: integer
        deprecation_message:
          type: string
          description: 'DeprecationMessage if set, will mark the template as deprecated and block

            any new workspaces from using this template.

            If passed an empty string, will remove the deprecated message, making

            the template usable for new workspaces again.'
        description:
          type: string
        disable_everyone_group_access:
          type: boolean
          description: 'DisableEveryoneGroupAccess allows optionally disabling the default

            behavior of granting the ''everyone'' group access to use the template.

            If this is set to true, the template will not be available to all users,

            and must be explicitly granted to users or groups in the permissions settings

            of the template.'
        disable_module_cache:
          type: boolean
          description: 'DisableModuleCache disables the using of cached Terraform modules during

            provisioning. It is recommended not to disable this.'
        display_name:
          type: string
        failure_ttl_ms:
          type: integer
        icon:
          type: string
        max_port_share_level:
          $ref: '#/components/schemas/codersdk.WorkspaceAgentPortShareLevel'
        name:
          type: string
        require_active_version:
          type: boolean
          description: 'RequireActiveVersion mandates workspaces built using this template

            use the active version of the template. This option has no

            effect on template admins.'
        time_til_dormant_autodelete_ms:
          type: integer
        time_til_dormant_ms:
          type: integer
        update_workspace_dormant_at:
          type: boolean
          description: 'UpdateWorkspaceDormantAt updates the dormant_at field of workspaces spawned

            from the template. This is useful for preventing dormant workspaces being

            immediately deleted when updating the dormant_ttl field to a new, shorter

            value.'
        update_workspace_last_used_at:
          type: boolean
          description: 'UpdateWorkspaceLastUsedAt updates the last_used_at field of workspaces

            spawned from the template. This is useful for preventing workspaces being

            immediately locked when updating the inactivity_ttl field to a new, shorter

            value.'
        use_classic_parameter_flow:
          type: boolean
          description: 'UseClassicParameterFlow is a flag that switches the default behavior to use the classic

            parameter flow when creating a workspace. This only affects deployments with the experiment

            "dynamic-parameters" enabled. This setting will live for a period after the experiment is

            made the default.

            An "opt-out" is present in case the new feature breaks some existing templates.'
    codersdk.DynamicParametersResponse:
