---
aid: coder
name: Coder
description: >-
  Coder is a self-hosted and cloud platform for remote cloud development
  environments (CDEs) and AI coding agents, where workspaces are defined
  using Terraform and connected via a secure WireGuard tunnel. It serves
  individual developers and enterprises in industries such as automotive,
  finance, government, and technology, providing governed, reproducible
  workspaces with IDE integrations for VS Code, JetBrains, Cursor, and
  others. Coder exposes a comprehensive REST API (v2) covering workspaces,
  templates, users, organizations, agents, and enterprise management, with
  a published Swagger 2.0 specification. SDKs include a built-in Go client
  (codersdk) and a Terraform provider; a CLI with 40+ subcommands is also
  available for full programmatic control.
